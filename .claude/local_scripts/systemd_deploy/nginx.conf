events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    # ── casa110.duckdns.org (existing homeboard app) ────────────────────────────

    server {
        listen 80;
        server_name casa110.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name casa110.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/casa110.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/casa110.duckdns.org/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── mhde.duckdns.org (ML predictions dashboard + review server) ─────────────

    server {
        listen 80;
        server_name mhde.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name mhde.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mhde.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mhde.duckdns.org/privkey.pem;

        # Streamlit dashboard (primary)
        location / {
            proxy_pass http://unix:/tmp/mhde-relay/streamlit.sock;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Streamlit websocket endpoint
        location /_stcore/stream {
            proxy_pass http://unix:/tmp/mhde-relay/streamlit.sock;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Review server on /review subpath
        location /review/ {
            proxy_pass http://unix:/tmp/mhde-relay/proxy.sock:/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
