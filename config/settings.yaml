logging:
  level: INFO
  format: "%(asctime)s %(name)-30s %(levelname)-8s %(message)s"

http:
  timeout: 30
  retries: 2
  retry_delay: 1.0

outputs:
  dir: outputs
  samples_dir: samples

sec_edgar:
  base_url: https://data.sec.gov
  user_agent: "MHDE-Validation contact@example.com"
  rate_limit_delay: 0.12

polygon:
  base_url: https://api.polygon.io
  # key from env: POLYGON_API_KEY
  rate_limit_delay: 0.5

alpha_vantage:
  base_url: https://www.alphavantage.co
  # key from env: ALPHA_VANTAGE_API_KEY
  rate_limit_delay: 12.0   # free tier: 5 calls/min

company_ir:
  request_delay: 1.5
  request_timeout: 20

nasdaq_earnings:
  base_url: https://api.nasdaq.com
  rate_limit_delay: 1.0

fred:
  base_url: https://api.stlouisfed.org/fred
  # key from env: FRED_API_KEY
  rate_limit_delay: 0.5

finra:
  base_url: https://cdn.finra.org/equity/otcmarket/biweekly
  rate_limit_delay: 1.0

cftc:
  tff_url: https://publicreporting.cftc.gov/resource/gpe5-46if.json
  disag_url: https://publicreporting.cftc.gov/resource/kh3c-gbw2.json
  rate_limit_delay: 0.5
  history_weeks: 4

# Feature flags — all disabled by default.
# To enable a flag for shadow testing, set its value to true here.
# WARNING: enabling a flag may cause shadow scores to diverge from production scores.
# No flag should ever be enabled without a corresponding governance proposal.
feature_flags:
  scaled_catalyst_adjustment: false
  sector_momentum_boost: false
  earnings_surprise_boost: false
  news_contract_boost: false
  risk_haircut: false
