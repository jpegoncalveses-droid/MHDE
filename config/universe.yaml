# Primary tier: all tickers in universe/sp500_tickers.yaml + fallback_tickers below.
# Primary tickers are never capped by max_symbols.
#
# max_symbols caps only the extended tier (SEC-filtered fillers).
# Set high enough to leave a few extended slots after ~503 S&P primaries.
max_symbols: 520
min_price: 2.0
exclude_etfs: true
exclude_funds: true
exclude_adrs: false
exchanges:
  - NYSE
  - NASDAQ
  - AMEX

# Additional primary tickers beyond the S&P 500 YAML.
# These receive universe_tier="primary" and bypass the max_symbols cap.
fallback_tickers:
  - AAPL
  - NVDA
  - TSLA
  - JPM
  - UBER
  - RKLB

# Universe mode definitions
# Default mode is sp500 (primary tier only).
# us_large_cap includes extended tickers with market_cap >= min_market_cap_usd.
# extended includes all active tickers regardless of market_cap.
universe_modes:
  sp500:
    description: "S&P 500 primary tickers only"
    tier_filter:
      - primary
  us_large_cap:
    description: "S&P 500 plus extended tickers with market_cap >= threshold"
    tier_filter:
      - primary
      - extended
    min_market_cap_usd: 10000000000
  extended:
    description: "All active tickers regardless of market_cap"
    tier_filter:
      - primary
      - extended
    min_market_cap_usd: null
