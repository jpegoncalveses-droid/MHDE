# SYSTEM-level drop-in — DO NOT install with `systemctl --user`.
#
# Install target (operator, sudo):
#   sudo install -D -m 0644 \
#     systemd/system/user.slice.d/10-capture-deprioritize.conf \
#     /etc/systemd/system/user.slice.d/10-capture-deprioritize.conf
#   sudo systemctl daemon-reload
#
# Why this is required (cross-slice arbitration):
#   The capture services run as systemd --user units, i.e. under user.slice. The
#   engine's monitoring/pipeline units run under system.slice. CPUWeight/IOWeight
#   are arbitrated only AMONG siblings of the same parent, so the per-unit weights
#   on the capture services (CPUWeight=20 ...) only rank capture units against each
#   OTHER inside user.slice — they do NOT make the engine win against capture.
#
#   To make the engine (system.slice, default weight 100) actually win CPU + IO
#   under contention, user.slice as a whole must be deprioritized below 100. This
#   drop-in sets it to 50, so system.slice gets ~2x the CPU/IO of ALL user units
#   combined when both are saturated — while leaving capture un-throttled when the
#   engine is idle (weights only bite under contention).
#
# Not auto-installed: it is system-level and needs sudo. The OPERATIONS.md runbook
# installs it before enabling any capture unit.
[Slice]
CPUWeight=50
IOWeight=50
